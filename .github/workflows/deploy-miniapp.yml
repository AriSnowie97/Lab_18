name: Deploy Mini App to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'miniapp/**'   # деплоить только если изменился miniapp/

  workflow_dispatch:    # также можно запустить вручную из GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload miniapp/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: miniapp   # деплоим папку miniapp/ как корень сайта

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
